<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="700" fill="#f9f9f9" rx="10" ry="10"/>
  
  <rect x="50" y="30" width="900" height="60" fill="#4a90e2" rx="5" ry="5" stroke="#333" stroke-width="2"/>
  <text x="500" y="55" font-family="SimHei, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">关键科学问题</text>
  <text x="500" y="80" font-family="SimHei, sans-serif" font-size="14" fill="white" text-anchor="middle">如何利用可重构天线系统突破传统MIMO功耗与成本瓶颈，实现“智能电磁环境”的高效重构？</text>

  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="120" height="550" fill="#e1f5fe" rx="5" ry="5" stroke="#4a90e2" stroke-width="1"/>
    <text x="60" y="100" font-family="SimHei, sans-serif" font-size="16" fill="#0277bd" text-anchor="middle" writing-mode="tb">研 究 挑 战</text>
    <text x="60" y="275" font-family="SimHei, sans-serif" font-size="16" fill="#0277bd" text-anchor="middle" writing-mode="tb">研 究 内 容</text>
    <text x="60" y="450" font-family="SimHei, sans-serif" font-size="16" fill="#0277bd" text-anchor="middle" writing-mode="tb">目 标 &amp; 章 节</text>
  </g>

  <g transform="translate(180, 120)">
    <rect x="0" y="-15" width="240" height="30" fill="#ffecb3" rx="5" ry="5" stroke="#ff8f00"/>
    <text x="120" y="5" font-family="SimHei, sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">发射机架构重构 (DMA)</text>
    
    <rect x="10" y="30" width="220" height="120" fill="white" rx="5" ry="5" stroke="#333" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="120" y="55" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">理想连续相位假设与</text>
    <text x="120" y="75" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">实际离散硬件约束的鸿沟；</text>
    <text x="120" y="95" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">传统CSI获取困难；</text>
    <text x="120" y="115" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">洛伦兹谐振约束限制</text>
    
    <line x1="120" y1="150" x2="120" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="10" y="180" width="220" height="180" fill="white" rx="5" ry="5" stroke="#333" stroke-width="2"/>
    <text x="120" y="205" font-family="SimHei, sans-serif" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">理论极限推导与离散算法</text>
    <line x1="20" y1="215" x2="220" y2="215" stroke="#ccc"/>
    <text x="120" y="235" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">1. 连续DMA性能极限分析</text>
    <text x="120" y="250" font-family="SimHei, sans-serif" font-size="10" fill="#666" text-anchor="middle">(SNR/中断概率/容量闭式解)</text>
    <text x="120" y="270" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">2. 基于RSSI的相位对齐</text>
    <text x="120" y="295" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">3. 离散相位波束赋形算法</text>
    <text x="120" y="310" font-family="SimHei, sans-serif" font-size="10" fill="#666" text-anchor="middle">(CPP投影算法 &amp; OMPB最优算法)</text>
    <text x="120" y="330" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">4. 量化损耗理论界分析</text>
    
    <line x1="120" y1="360" x2="120" y2="390" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="10" y="390" width="220" height="140" fill="#d1c4e9" rx="5" ry="5" stroke="#673ab7" stroke-width="1"/>
    <text x="120" y="415" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">研究目标：</text>
    <text x="120" y="435" font-family="SimHei, sans-serif" font-size="11" fill="#333" text-anchor="middle">探明性能上限，解决离散难题</text>
    <line x1="30" y1="450" x2="210" y2="450" stroke="#673ab7"/>
    <text x="120" y="475" font-family="SimHei, sans-serif" font-size="13" fill="#673ab7" text-anchor="middle" font-weight="bold">第二章</text>
    <text x="120" y="495" font-family="SimHei, sans-serif" font-size="11" fill="#673ab7" text-anchor="middle">(连续DMA理论)</text>
    <text x="120" y="515" font-family="SimHei, sans-serif" font-size="13" fill="#673ab7" text-anchor="middle" font-weight="bold">第三章</text>
    <text x="120" y="535" font-family="SimHei, sans-serif" font-size="11" fill="#673ab7" text-anchor="middle">(离散DMA算法)</text>
  </g>

  <g transform="translate(430, 120)">
    <rect x="0" y="-15" width="240" height="30" fill="#c8e6c9" rx="5" ry="5" stroke="#2e7d32"/>
    <text x="120" y="5" font-family="SimHei, sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">天线位置重构 (PASS)</text>
    
    <rect x="10" y="30" width="220" height="120" fill="white" rx="5" ry="5" stroke="#333" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="120" y="55" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">非理想波导损耗限制系统容量；</text>
    <text x="120" y="75" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">通信与定位资源分配矛盾；</text>
    <text x="120" y="95" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">最优天线位置与损耗的权衡</text>
    
    <line x1="120" y1="150" x2="120" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="10" y="180" width="220" height="180" fill="white" rx="5" ry="5" stroke="#333" stroke-width="2"/>
    <text x="120" y="205" font-family="SimHei, sans-serif" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">有损分析与位置辅助通信</text>
    <line x1="20" y1="215" x2="220" y2="215" stroke="#ccc"/>
    <text x="120" y="235" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">1. 有损PASS通信性能分析</text>
    <text x="120" y="250" font-family="SimHei, sans-serif" font-size="10" fill="#666" text-anchor="middle">(波导损耗/系统容量推导)</text>
    <text x="120" y="270" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">2. 高精度定位算法</text>
    <text x="120" y="285" font-family="SimHei, sans-serif" font-size="10" fill="#666" text-anchor="middle">(FIM推导/MUSIC联合算法)</text>
    <text x="120" y="310" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">3. 位置辅助波束赋形</text>
    <text x="120" y="330" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">4. 参数权衡与最优PA配置</text>

    <line x1="120" y1="360" x2="120" y2="390" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="10" y="390" width="220" height="140" fill="#e1bee7" rx="5" ry="5" stroke="#8e24aa" stroke-width="1"/>
    <text x="120" y="415" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">研究目标：</text>
    <text x="120" y="435" font-family="SimHei, sans-serif" font-size="11" fill="#333" text-anchor="middle">定量刻画损耗，实现通感一体</text>
    <line x1="30" y1="450" x2="210" y2="450" stroke="#8e24aa"/>
    <text x="120" y="495" font-family="SimHei, sans-serif" font-size="13" fill="#8e24aa" text-anchor="middle" font-weight="bold">第四章</text>
    <text x="120" y="515" font-family="SimHei, sans-serif" font-size="11" fill="#8e24aa" text-anchor="middle">(有损分析与位置辅助通信)</text>
  </g>

  <g transform="translate(680, 120)">
    <rect x="0" y="-15" width="240" height="30" fill="#bbdefb" rx="5" ry="5" stroke="#1976d2"/>
    <text x="120" y="5" font-family="SimHei, sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">信道环境重构 (RIS)</text>
    
    <rect x="10" y="30" width="220" height="120" fill="white" rx="5" ry="5" stroke="#333" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="120" y="55" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">无射频链路导致信道估计难；</text>
    <text x="120" y="75" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">大规模阵列配置计算开销大；</text>
    <text x="120" y="95" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">理论研究与工程部署脱节</text>
    
    <line x1="120" y1="150" x2="120" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="10" y="180" width="220" height="180" fill="white" rx="5" ry="5" stroke="#333" stroke-width="2"/>
    <text x="120" y="205" font-family="SimHei, sans-serif" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">低复杂度算法与原型系统</text>
    <line x1="20" y1="215" x2="220" y2="215" stroke="#ccc"/>
    <text x="120" y="235" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">1. 两阶段角度域码本算法</text>
    <text x="120" y="255" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">2. 改进贪婪波束赋形算法</text>
    <text x="120" y="270" font-family="SimHei, sans-serif" font-size="10" fill="#666" text-anchor="middle">(模拟退火/马尔科夫链)</text>
    <text x="120" y="295" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">3. 1100阵元RIS原型系统</text>
    <text x="120" y="315" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle">4. 多场景外场测试</text>
    <text x="120" y="330" font-family="SimHei, sans-serif" font-size="10" fill="#666" text-anchor="middle">(室内/室外/5G现网/视频流)</text>

    <line x1="120" y1="360" x2="120" y2="390" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="10" y="390" width="220" height="140" fill="#b3e5fc" rx="5" ry="5" stroke="#0277bd" stroke-width="1"/>
    <text x="120" y="415" font-family="SimHei, sans-serif" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">研究目标：</text>
    <text x="120" y="435" font-family="SimHei, sans-serif" font-size="11" fill="#333" text-anchor="middle">实现高效配置，验证工程可行性</text>
    <line x1="30" y1="450" x2="210" y2="450" stroke="#0277bd"/>
    <text x="120" y="475" font-family="SimHei, sans-serif" font-size="13" fill="#0277bd" text-anchor="middle" font-weight="bold">第五章</text>
    <text x="120" y="495" font-family="SimHei, sans-serif" font-size="11" fill="#0277bd" text-anchor="middle">(低复杂度算法)</text>
    <text x="120" y="515" font-family="SimHei, sans-serif" font-size="13" fill="#0277bd" text-anchor="middle" font-weight="bold">第六章</text>
    <text x="120" y="535" font-family="SimHei, sans-serif" font-size="11" fill="#0277bd" text-anchor="middle">(原型系统与外场测试)</text>
  </g>
</svg>